<div role="group">
  <span class="badge badge-pending" data-tooltip="Pending">{{ counts.pending }}</span>
  <span class="badge badge-processing" data-tooltip="Processing">{{ counts.processing }}</span>
  <span class="badge badge-completed" data-tooltip="Completed">{{ counts.completed }}</span>
  <span class="badge badge-failed" data-tooltip="Failed">{{ counts.failed }}</span>
  <span class="badge badge-skipped" data-tooltip="Skipped">{{ counts.skipped }}</span>
  <span class="badge badge-saved" data-tooltip="Space saved">{{ saved|human_size }}</span>
</div>
