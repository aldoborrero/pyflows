<article>
  <header>Queue ({{ pending|length }} pending)</header>
  {% if pending %}
  <figure>
    <table role="grid">
      <thead>
        <tr><th>File</th><th>Library</th><th>Codec</th><th>Size</th><th>Queued</th></tr>
      </thead>
      <tbody>
        {% for f in pending %}
        <tr>
          <td title="{{ f['path'] }}">{{ f['path'].split('/')[-1]|truncate(40) }}</td>
          <td>{{ f['library'] }}</td>
          <td>{{ f['video_codec'] or '—' }}</td>
          <td>{{ f['size']|human_size }}</td>
          <td>{{ f['created_at']|relative_time }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </figure>
  {% else %}
  <p class="muted">Queue is empty</p>
  {% endif %}
</article>
