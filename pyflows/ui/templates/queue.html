{% extends "base.html" %}
{% block title_suffix %} — Queue{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h2 class="text-2xl font-bold">Queue</h2>
</div>

<div class="tabs tabs-boxed bg-base-200 mb-4 w-fit">
  <a href="/ui/queue" class="tab{% if not filter %} tab-active{% endif %}">All</a>
  <a href="/ui/queue?filter=pending" class="tab{% if filter == 'pending' %} tab-active{% endif %}">Pending</a>
  <a href="/ui/queue?filter=processing" class="tab{% if filter == 'processing' %} tab-active{% endif %}">Processing</a>
  <a href="/ui/queue?filter=on_hold" class="tab{% if filter == 'on_hold' %} tab-active{% endif %}">On Hold</a>
  <a href="/ui/queue?filter=retry" class="tab{% if filter == 'retry' %} tab-active{% endif %}">Retry</a>
</div>

<div class="flex flex-wrap gap-2 mb-4">
  <div class="form-control flex-1 min-w-[200px]">
    <div class="input input-bordered flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
      <input type="search" name="q" placeholder="Search files..." value="{{ query or '' }}"
             hx-get="/ui/partials/queue-table" hx-target="#queue-tbody" hx-swap="innerHTML"
             hx-trigger="keyup changed delay:300ms" hx-include="[name=library],[name=filter_val]"
             class="grow bg-transparent border-none outline-none focus:outline-none">
    </div>
  </div>
  <select name="library" class="select select-bordered"
          hx-get="/ui/partials/queue-table" hx-target="#queue-tbody"
          hx-swap="innerHTML" hx-include="[name=q],[name=filter_val]">
    <option value="">All libraries</option>
    {% for lib in libraries %}
    <option value="{{ lib }}" {% if library == lib %}selected{% endif %}>{{ lib }}</option>
    {% endfor %}
  </select>
  <input type="hidden" name="filter_val" value="{{ filter or '' }}">
</div>

<div class="card bg-base-200 shadow-lg">
  <div class="card-body p-0">
    <div class="overflow-x-auto">
      <table class="table table-zebra">
        <thead>
          <tr>
            <th>File</th>
            <th>Library</th>
            <th>Codec</th>
            <th>Size</th>
            <th>Queued</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="queue-tbody">
          {% include "partials/queue_table.html" %}
        </tbody>
      </table>
    </div>
  </div>
</div>

{% if files|length >= 50 %}
<div class="flex justify-center mt-4">
  <button class="btn btn-ghost"
          hx-get="/ui/partials/queue-table?offset=50{% if filter %}&filter_val={{ filter }}{% endif %}"
          hx-target="#queue-tbody" hx-swap="beforeend">Load more</button>
</div>
{% endif %}
{% endblock %}
